name: pull-request-checks
run-name: pull-request-checks for ${{ github.head_ref }}

on:
  pull_request:
    branches: main

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: windows-latest, r: "release" }
          - {
              os: ubuntu-latest,
              r: "release",
              rspm: "https://packagemanager.rstudio.com/cran/__linux__/focal/latest",
            }
          - {
              os: ubuntu-latest,
              r: "4.2.0",
              rspm: "https://packagemanager.rstudio.com/cran/__linux__/focal/latest",
            }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          pak-version: rc
          extra-packages: |
            any::rcmdcheck
            any::testthat@3.1.8
            SticsRPacks/SticsRFiles@main
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  integration-tests-main:
    name: integration-tests (others main)
    needs: R-CMD-check
    uses: SticsRPacks/SticsRTests/.github/workflows/integration-tests.yaml@main
    with:
      repo: SticsOnR
      ref: ${{ github.head_ref }}
      sha: ${{ github.event.pull_request.head.sha }}
      dependency_mode: main
      sticsrtests_ref: main
    secrets: inherit

  integration-tests-release:
    name: integration-tests (others release)
    needs: R-CMD-check
    uses: SticsRPacks/SticsRTests/.github/workflows/integration-tests.yaml@main
    with:
      repo: SticsOnR
      ref: ${{ github.head_ref }}
      sha: ${{ github.event.pull_request.head.sha }}
      dependency_mode: release
      sticsrtests_ref: main
    secrets: inherit
